services:
  - type: web
    name: dungeon-crawler-bot
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: DISCORD_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 3000
      - key: SELF_PING_URL
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: SECRET_CHANNEL_ID
        sync: false
